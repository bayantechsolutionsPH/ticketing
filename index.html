<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit a Support Request</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-lg">
        <h2 class="text-2xl font-bold text-gray-800 mb-2">Submit a Support Request</h2>
        <p class="text-gray-600 text-sm mb-6">No login required. Fill out the fields below, and our team will get back to you as soon as possible.</p>

        <form action="https://api.web3forms.com/submit" method="POST" id="ticketForm">
            
            <input type="hidden" name="access_key" value="9c846078-57e9-4f07-92de-52fff584f303">
            
            <input type="hidden" name="subject" value="New Business Support Ticket">
            
            <input type="checkbox" name="botcheck" class="hidden" style="display: none;">

            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-semibold mb-2" for="name">Full Name</label>
                <input class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" 
                       type="text" name="name" id="name" placeholder="Juan Dela Cruz" required>
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-semibold mb-2" for="phone">Contact Number</label>
                <input class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" 
                       type="tel" name="phone" id="phone" placeholder="09123456789" required>
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-semibold mb-2" for="service">Service Needed</label>
                <select class="w-full px-3 py-2 border border-gray-300 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-blue-500" 
                        name="service_type" id="service" required>
                    <option value="" disabled selected>Select a service...</option>
                    <option value="Internet / Network Issue">Internet / Network Issue</option>
                    <option value="CCTV Maintenance">CCTV Maintenance / Camera Down</option>
                    <option value="Computer Repair">Computer Repair / Hardware</option>
                    <option value="Software Setup">Software Setup & Configuration</option>
                    <option value="Other">Other Inquiry</option>
                </select>
            </div>

            <!-- Location Details Group -->
            <div class="border-t border-b border-gray-100 py-4 my-4">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
                    <!-- City (Locked to Borongan City) -->
                    <div>
                        <label class="block text-gray-700 text-sm font-semibold mb-2" for="city">City / Municipality</label>
                        <input class="w-full px-3 py-2 border border-gray-300 rounded-lg bg-gray-100 text-gray-500 cursor-not-allowed focus:outline-none font-medium" 
                               type="text" name="city" id="city" value="Borongan City" readonly>
                    </div>

                    <!-- Barangay Dropdown Selector -->
                    <div>
                        <label class="block text-gray-700 text-sm font-semibold mb-2" for="barangay">Barangay</label>
                        <select class="w-full px-3 py-2 border border-gray-300 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-blue-500" 
                                name="barangay" id="barangay" required>
                            <option value="" disabled selected>Select Barangay...</option>
                            <option value="Alang-alang">Alang-alang</option>
                            <option value="Amantacop">Amantacop</option>
                            <option value="Ando">Ando</option>
                            <option value="Balacdas">Balacdas</option>
                            <option value="Balud">Balud</option>
                            <option value="Banuyo">Banuyo</option>
                            <option value="Baras">Baras</option>
                            <option value="Bato">Bato</option>
                            <option value="Bayobay">Bayobay</option>
                            <option value="Benowangan">Benowangan</option>
                            <option value="Bugas">Bugas</option>
                            <option value="Cabalagnan">Cabalagnan</option>
                            <option value="Cabong">Cabong</option>
                            <option value="Cagbonga">Cagbonga</option>
                            <option value="Calico-an">Calico-an</option>
                            <option value="Calingatngan">Calingatngan</option>
                            <option value="Campesao">Campesao</option>
                            <option value="Can-abong">Can-abong</option>
                            <option value="Can-aga">Can-aga</option>
                            <option value="Camada">Camada</option>
                            <option value="Canjaway">Canjaway</option>
                            <option value="Canlaray">Canlaray</option>
                            <option value="Canyupay">Canyupay</option>
                            <option value="Divinubo">Divinubo</option>
                            <option value="Hebacong">Hebacong</option>
                            <option value="Hindang">Hindang</option>
                            <option value="Lalawigan">Lalawigan</option>
                            <option value="Libuton">Libuton</option>
                            <option value="Locso-on">Locso-on</option>
                            <option value="Maybacong">Maybacong</option>
                            <option value="Maypangdan">Maypangdan</option>
                            <option value="Pepelitan">Pepelitan</option>
                            <option value="Pinanag-an">Pinanag-an</option>
                            <option value="Purok A (Pob.)">Purok A (Pob.)</option>
                            <option value="Purok B (Pob.)">Purok B (Pob.)</option>
                            <option value="Purok C (Pob.)">Purok C (Pob.)</option>
                            <option value="Purok D1 (Pob.)">Purok D1 (Pob.)</option>
                            <option value="Purok D2 (Pob.)">Purok D2 (Pob.)</option>
                            <option value="Purok E (Pob.)">Purok E (Pob.)</option>
                            <option value="Purok F (Pob.)">Purok F (Pob.)</option>
                            <option value="Purok G (Pob.)">Purok G (Pob.)</option>
                            <option value="Purok H (Pob.)">Purok H (Pob.)</option>
                            <option value="Punta Maria">Punta Maria</option>
                            <option value="Sabang North">Sabang North</option>
                            <option value="Sabang South">Sabang South</option>
                            <option value="San Andres">San Andres</option>
                            <option value="San Gabriel">San Gabriel</option>
                            <option value="San Gregorio">San Gregorio</option>
                            <option value="San Jose">San Jose</option>
                            <option value="San Mateo">San Mateo</option>
                            <option value="San Pablo">San Pablo</option>
                            <option value="San Saturnino (Tacyang)">San Saturnino (Tacyang)</option>
                            <option value="Santa Fe">Santa Fe</option>
                            <option value="Siha">Siha</option>
                            <option value="Songco">Songco</option>
                            <option value="Sohutan">Sohutan</option>
                            <option value="Suribao">Suribao</option>
                            <option value="Surok">Surok</option>
                            <option value="Taboc">Taboc</option>
                            <option value="Tabunan">Tabunan</option>
                            <option value="Tamoso">Tamoso</option>
                        </select>
                    </div>
                </div>

                <!-- Nearest Landmark Field -->
                <div class="mb-2">
                    <label class="block text-gray-700 text-sm font-semibold mb-2" for="landmark">Nearest Landmark</label>
                    <input class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" 
                           type="text" name="nearest_landmark" id="landmark" placeholder="e.g., Near Tabunan Chapel, Green Gate" required>
                </div>

            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-semibold mb-2" for="message">Describe the Problem</label>
                <textarea class="w-full px-3 py-2 border border-gray-300 rounded-lg h-32 resize-none focus:outline-none focus:ring-2 focus:ring-blue-500" 
                          name="issue_description" id="message" placeholder="Please provide details about the problem..." required></textarea>
            </div>

            <button class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 px-4 rounded-lg transition duration-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2" 
                    type="submit">
                Submit Ticket
            </button>
        </form>
    </div>

</body>
</html>
